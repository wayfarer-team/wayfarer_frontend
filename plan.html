
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYFARER KG - Планировщик</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#a58442;
            color:#222;
        }

        .navbar{
            background:#8b1e2d;
            padding:20px 40px;
            color:white;
            font-size:24px;
            font-weight:bold;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .planner{
            max-width:1200px;
            margin:50px auto;
            padding:20px;
        }

        .section-header{
            text-align:center;
            margin-bottom:40px;
            color:white;
        }

        .section-header h2{
            font-size:42px;
            margin-bottom:10px;
        }

        .planner-grid{
            display:grid;
            grid-template-columns:1.2fr 0.8fr;
            gap:30px;
        }

        .planner-card{
            background:white;
            border-radius:24px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            animation:fadeUp 0.7s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .planner-card h3{
            margin-bottom:20px;
            color:#8b1e2d;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:1px solid #d4b16a;
            margin-bottom:20px;
            outline:none;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        .save-btn,
        .ai-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .save-btn{
            background:#8b1e2d;
        }

        .save-btn:hover{
            background:#6f1521;
            transform:scale(1.02);
        }

        .ai-btn{
            background:#1d4ed8;
        }

        .ai-btn:hover{
            background:#163aa9;
            transform:scale(1.02);
        }

        .tips{
            display:grid;
            gap:20px;
        }

        .tip{
            background:#faf1dd;
        }

        .route-box{
            margin-top:20px;
            background:#fff7e8;
            padding:20px;
            border-radius:18px;
            line-height:1.8;
        }

        ul{
            padding-left:20px;
        }

        li{
            margin-bottom:10px;
        }

        @media(max-width:800px){

            .planner-grid{
                grid-template-columns:1fr;
            }

            .section-header h2{
                font-size:32px;
            }

        }

    </style>

</head>

<body>

    <nav class="navbar">
        ✦ WAYFARER KG
    </nav>

    <div class="planner">

        <div class="section-header">
            <h2>Спланируйте поездку</h2>
            <p>Создайте маршрут по Кыргызстану</p>
        </div>

        <div class="planner-grid">

            <!-- Левая часть -->
            <div class="planner-card">

                <h3>Создание маршрута</h3>

                <form id="tripForm">

                    <label>Название поездки</label>

                    <input 
                        type="text"
                        id="tripName"
                        placeholder="Летнее путешествие"
                        required
                    >

                    <label>Дата начала</label>

                    <input 
                        type="date"
                        id="startDate"
                        required
                    >

                    <label>Дата окончания</label>

                    <input 
                        type="date"
                        id="endDate"
                        required
                    >

                    <label>Откуда выезжаете</label>

                    <select id="from">

                        <option>Баткен</option>
                        <option>Жалал-Абад</option>
                        <option>Ысык-Куль</option>
                        <option>Нарын</option>
                        <option>Талас</option>
                        <option>Ош</option>
                        <option>Чуй</option>

                    </select>

                    <label>Куда поедете</label>

                    <select id="to">

                        <option>Иссык-Куль</option>
                        <option>Нарын</option>
                        <option>Талас</option>
                        <option>Ош</option>
                        <option>Чуй</option>
                        <option>Жалал-Абад</option>
                        <option>Баткен</option>
                        <option>Бишкек</option>

                    </select>

                    <label>Что хотите посетить</label>

                    <textarea 
                        id="places"
                        placeholder="Озеро, каньоны, горы..."
                    ></textarea>

                    <button type="submit" class="save-btn">
                        Сохранить поездку
                    </button>

                </form>

                <div class="route-box" id="routePreview">
                    Ваш маршрут появится здесь.
                </div>

            </div>

            <!-- Правая часть -->
            <div class="tips">

                <!-- AI маршрут -->
                <div class="planner-card tip">

                    <h3>🤖 AI Маршрут</h3>

                    <button 
                        class="ai-btn"
                        onclick="generateAITrip()"
                    >
                        Сгенерировать маршрут
                    </button>

                    <div class="route-box" id="aiRoute">
                        AI предложит маршрут для путешествия.
                    </div>

                </div>

                <!-- Совместная поездка -->
                <div class="planner-card tip">

                    <h3>👥 Совместная поездка</h3>

                    <input 
                        type="text"
                        id="friendName"
                        placeholder="Имя друга"
                    >

                    <button 
                        class="save-btn"
                        onclick="addFriend()"
                    >
                        Добавить
                    </button>

                    <ul id="friendsList"></ul>

                </div>

                
                <!-- Советы -->
                <div class="planner-card tip">

                    <h3>🏕️ Советы</h3>

                    <p>
                        Для горных маршрутов берите
                        тёплую одежду даже летом.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script>

        // Сохранение поездки
        const tripForm =
            document.getElementById("tripForm");

        const routePreview =
            document.getElementById("routePreview");

        tripForm.addEventListener("submit", function(e){

            e.preventDefault();

            const trip = {

                id: Date.now(),

                name:
                    document.getElementById("tripName").value,

                start:
                    document.getElementById("startDate").value,

                end:
                    document.getElementById("endDate").value,

                from:
                    document.getElementById("from").value,

                to:
                    document.getElementById("to").value,

                places:
                    document.getElementById("places").value,

                status:"Запланирована"

            };

            let trips =
                JSON.parse(
                    localStorage.getItem("plannerTrips")
                ) || [];

            trips.push(trip);

            localStorage.setItem(
                "plannerTrips",
                JSON.stringify(trips)
            );

            routePreview.innerHTML = `
                <h3>${trip.name}</h3>

                <p>
                    📅 ${trip.start} — ${trip.end}
                </p>

                <p>
                    🚗 ${trip.from} → ${trip.to}
                </p>

                <p>
                    📌 ${trip.places}
                </p>

                <p>
                    ✅ Статус: ${trip.status}
                </p>
            `;

            alert("Поездка сохранена!");

            tripForm.reset();

        });


        // AI маршрут
        function generateAITrip(){

            const routes = [

                "🏔️ Бишкек → Иссык-Куль → Каракол → Джеты-Огуз",

                "🌊 Бишкек → Сон-Куль → Нарын → Таш-Рабат",

                "⛰️ Ош → Сары-Челек → Арсланбоб"

            ];

            const randomRoute =
                routes[Math.floor(Math.random() * routes.length)];

            document.getElementById("aiRoute").innerHTML =
                `<p>${randomRoute}</p>`;

        }


        // Совместная поездка
        function addFriend(){

            const friendInput =
                document.getElementById("friendName");

            const friendName =
                friendInput.value;

            if(friendName.trim() === "") return;

            const li =
                document.createElement("li");

            li.textContent =
                "👤 " + friendName;

            document.getElementById("friendsList")
                .appendChild(li);

            friendInput.value = "";

        }


        
    </script>

</body>
</html>
```
