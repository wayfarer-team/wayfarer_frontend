  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .region-hero {
      min-height: 50vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      position: relative;
      margin-top: 80px;
    }
    .region-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,15,8,0.88), transparent);
    }
    .region-hero-content {
      position: relative;
      z-index: 2;
      color: var(--white);
      padding: 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    .region-hero-content h1 {
      font-size: 3rem;
      font-family: 'Cinzel Decorative', serif;
      margin-bottom: 0.5rem;
    }
    .region-hero-content p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    .region-attractions {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 2rem;
    }
    .region-attractions h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      color: var(--deep);
      margin-bottom: 2rem;
      text-align: center;
    }
    .attractions-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .attraction-item {
      overflow:hidden;
      border-radius:22px;
      background: rgba(200,151,42,0.08);
      border: 1px solid rgba(200,151,42,0.3);
      padding: 2rem;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .attraction-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(26,15,8,0.2);
    }
    .attraction-item h3 {
      color: var(--deep);
      margin-bottom: 0.5rem;
      font-family: 'Cinzel Decorative', serif;
    }
    .attraction-item img{width:100%;height:220px;object-fit:cover;margin-bottom:15px;border-radius:16px}.attraction-item p {
      color: var(--mid);
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .trip-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.9rem 2.8rem;
      background: var(--crimson);
      color: var(--white);
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.3s;
    }
    .trip-btn:hover {
      background: var(--dark);
    }
  </style>

    document.addEventListener('DOMContentLoaded', () => {
      const regionId = sessionStorage.getItem('selectedRegion');
      const region = regions.find(r => r.id === regionId);

    
    

      // Установить герой
      const hero = document.getElementById('regionHero');
      hero.style.backgroundImage = `url('${region.image}')`;
      hero.innerHTML += `
        <div class="region-hero-content">
          <h1>${region.name}</h1>
          <p>${region.fullDesc}</p>
        </div>
      `;

      // Отобразить достопримечательности
      const list = document.getElementById('attractionsList');
      const attractions = regionAttractions[regionId] || [];
      attractions.forEach(attr => {
        const div = document.createElement('div');
        div.className = 'attraction-item';
        const img = attr.image;div.innerHTML = `<img src='${img}' alt='${attr.title}'><h3>${attr.title}</h3><p>${attr.desc}</p>`;
        div.onclick=()=>{sessionStorage.setItem('selectedAttraction',JSON.stringify({title:attr.title,desc:attr.desc,image:img,history:'Красивое туристическое место Кыргызстана.',tips:'Лучшее время для посещения — лето и осень.'}));
        window.location.href='attraction-detail.html';};list.appendChild(div);
      });

      // Показать кнопку создания поездки только если авторизован
      const btn = document.getElementById('createTripBtn');
      if (!Auth.isLoggedIn()) {
        btn.textContent = 'Войдите, чтобы создать поездку';
        btn.onclick = () => showAuthModal('login');
      }

      const tripsLink = document.getElementById('tripsLink');
      if (Auth.isLoggedIn()) {
        tripsLink.style.display = 'inline-block';
      }
    });

    function createTrip() {
      if (!Auth.isLoggedIn()) {
        showAuthModal('login');
        return;
      }
      

      const regionId = sessionStorage.getItem('selectedRegion');

      const tripName = prompt('Введите название вашей поездки:');
      if (!tripName) return;

      const trip = {
        id: Date.now(),
        name: tripName,
        region: region.name,
        regionId: regionId,
        date: new Date().toLocaleDateString('ru-RU'),
        status: 'планируется'
      };

      Auth.addTrip(trip);
      alert(`Поездка "${tripName}" создана!`);
      window.location.href = 'trips.html';
    }
