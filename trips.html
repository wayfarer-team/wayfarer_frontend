<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мои поездки — Wayfarer KG</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ===== TRIPS SECTION BACKGROUND ===== */

.trips-container{
    position:relative;

    max-width:1000px;

    margin:100px auto;

    padding:3rem;

    border-radius:32px;

    background:
        radial-gradient(
            circle at top left,
            rgba(212,175,55,0.12),
            transparent 35%
        ),

        radial-gradient(
            circle at bottom right,
            rgba(139,30,45,0.18),
            transparent 40%
        ),

        linear-gradient(
            135deg,
            #1b120b 0%,
            #2b1a10 35%,
            #3b2617 70%,
            #5a3d22 100%
        );

    border:1px solid rgba(212,175,55,0.18);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.35);

    overflow:hidden;
}


/* Узор */
.trips-container::before{
    content:'';

    position:absolute;

    inset:0;

    background-image:
        linear-gradient(
            rgba(212,175,55,0.03) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(212,175,55,0.03) 1px,
            transparent 1px
        );

    background-size:38px 38px;

    pointer-events:none;
}


/* ===== HEADER ===== */

.trips-header{
    text-align:center;

    margin-bottom:3rem;

    position:relative;

    z-index:2;
}

.trips-header h1{
    font-family:'Cinzel Decorative', serif;

    font-size:2.7rem;

    color:#d4af37;

    margin-bottom:0.7rem;

    text-shadow:
        0 0 12px rgba(212,175,55,0.4),
        0 0 25px rgba(212,175,55,0.15);
}

.trips-header p{
    color:#e0c27a;

    font-size:1rem;

    letter-spacing:0.05em;
}


/* ===== TRIP CARD ===== */

.trips-list{
    display:grid;
    gap:1.5rem;

    position:relative;
    z-index:2;
}

.trip-card{
    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.04),
            rgba(212,175,55,0.06)
        );

    border:1px solid rgba(212,175,55,0.22);

    border-radius:24px;

    padding:2rem;

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(6px);

    transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        border 0.35s ease;
}

.trip-card:hover{
    transform:translateY(-6px);

    border:1px solid rgba(212,175,55,0.5);

    box-shadow:
        0 15px 40px rgba(0,0,0,0.35),
        0 0 25px rgba(212,175,55,0.1);
}


/* ===== TEXT ===== */

.trip-info h3{
    font-family:'Cinzel Decorative', serif;

    color:#ffd979;

    margin-bottom:0.6rem;

    text-shadow:
        0 0 10px rgba(212,175,55,0.25);
}

.trip-info p{
    color:rgba(255,235,180,0.78);

    font-size:0.92rem;

    margin:0.35rem 0;
}

.trip-region{
    color:#f4d06f;

    font-weight:600;
}


/* ===== BUTTONS ===== */

.trip-actions{
    display:flex;
    gap:1rem;
}

.trip-btn{
    padding:0.8rem 1.6rem;

    background:linear-gradient(
        135deg,
        #8b1e2d,
        #b33a4c
    );

    color:white;

    border:none;

    border-radius:14px;

    cursor:pointer;

    font-size:0.78rem;

    letter-spacing:0.12em;

    text-transform:uppercase;

    transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
}

.trip-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(139,30,45,0.35);
}


/* DELETE BUTTON */

.trip-btn-delete{
    background:linear-gradient(
        135deg,
        rgba(192,24,42,0.75),
        rgba(255,70,90,0.7)
    );
}

.trip-btn-delete:hover{
    box-shadow:
        0 10px 25px rgba(192,24,42,0.35);
}


/* ===== EMPTY STATE ===== */

.empty-state{
    text-align:center;

    padding:3rem 2rem;

    color:#e0c27a;
}

.empty-state h2{
    font-family:'Cinzel Decorative', serif;

    color:#ffd979;

    margin-bottom:1rem;
}


/* ===== CREATE BUTTON ===== */

.create-trip-btn{
    display:inline-block;

    margin-top:2rem;

    padding:1rem 3rem;

    background:linear-gradient(
        135deg,
        #8b1e2d,
        #b33a4c
    );

    color:white;

    text-decoration:none;

    border:none;

    border-radius:16px;

    cursor:pointer;

    font-size:0.8rem;

    letter-spacing:0.18em;

    text-transform:uppercase;

    transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
}

.create-trip-btn:hover{
    transform:translateY(-3px);

    box-shadow:
        0 15px 35px rgba(139,30,45,0.4);
}
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar" id="navbar">
    <div class="nav-logo">
      <span class="ornament-small">✦</span> WAYFARER KG
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Главная</a></li>
      <li><a href="regions.html">Регионы</a></li>
      <li><a href="attractions.html">Достопримечательности</a></li>
      <li><a href="culture.html">Культура</a></li>
      <li><a href="plan.html">Спланируйте поездку</a></li>
      <li><a href="trips.html" id="tripsLink">Мои поездки</a></li>
    </ul>
    <div class="nav-toggle" onclick="toggleMenu()">☰</div>
    <div id="authBtn"></div>
  </nav>

  <!-- ПОЕЗДКИ -->
  <div class="trips-container">
    <div class="trips-header">
      <h1>Мои поездки</h1>
      <p id="userGreeting"></p>
    </div>

    <div id="tripsContent"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-ornament">
      <svg viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,30 Q50,5 100,30 T200,30 T300,30 T400,30" stroke="#c8972a" stroke-width="1.5" fill="none" opacity="0.6"/>
        <circle cx="200" cy="30" r="5" fill="#c8972a" opacity="0.8"/>
        <circle cx="100" cy="30" r="3" fill="#c8972a" opacity="0.5"/>
        <circle cx="300" cy="30" r="3" fill="#c8972a" opacity="0.5"/>
      </svg>
    </div>
    <div class="footer-logo">WAYFARER KG</div>
    <p class="footer-tagline">Самая красивая страна в мире — нетронутая, незабываемая.</p>
    <p class="footer-copy">© 2025 Wayfarer KG. Все права защищены.</p>
  </footer>

  <script src="auth.js">function completeTrip(id){const comment=prompt("Комментарий о поездке:");const rating=prompt("Оценка от 1 до 5:");alert(`Спасибо! Ваш отзыв: ${comment} | Оценка: ${rating}`);}
</script>
  <script src="script.js">function completeTrip(id){const comment=prompt("Комментарий о поездке:");const rating=prompt("Оценка от 1 до 5:");alert(`Спасибо! Ваш отзыв: ${comment} | Оценка: ${rating}`);}
</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      const user = Auth.getCurrentUser();
      document.getElementById('userGreeting').textContent = `Добро пожаловать, ${user.name}!`;

      const trips = Auth.getTrips();
      const content = document.getElementById('tripsContent');

      if (trips.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <h2>У вас нет поездок</h2>
            <p>Начните свой первый путешествие в Киргизию</p>
            <a href="regions.html" class="create-trip-btn">Выбрать регион</a>
          </div>
        `;
      } else {
        let html = '<div class="trips-list">';
        trips.forEach(trip => {
          html += `
            <div class="trip-card">
              <div class="trip-info">
                <h3>${trip.name}</h3>
                <p class="trip-region">📍 ${trip.region}</p>
                <p>Создана: ${trip.date}</p>
                <p>Статус: <strong>${trip.status}</strong></p>
              <p>Маршрут: ${trip.from || '—'} → ${trip.to || '—'}</p></div><div class="trip-actions">
                <button class="trip-btn" onclick="editTrip(${trip.id})">Редактировать</button>
                <button class="trip-btn trip-btn-delete" onclick="deleteTrip(${trip.id})">Удалить</button><button class="trip-btn" onclick="completeTrip(${trip.id})">Завершить</button>
              </div>
            </div>
          `;
        });
        html += '</div>';
        content.innerHTML = html;
      }
    });

    function editTrip(tripId) {
      const trips = Auth.getTrips();
      const trip = trips.find(t => t.id === tripId);
      if (!trip) return;

      const newName = prompt('Новое название поездки:', trip.name);
      if (newName && newName !== trip.name) {
        trip.name = newName;
        const user = Auth.getCurrentUser();
        const users = JSON.parse(localStorage.getItem('wayfarer_users'));
        users[user.email].trips = trips;
        localStorage.setItem('wayfarer_users', JSON.stringify(users));
        user.trips = trips;
        localStorage.setItem('wayfarer_current_user', JSON.stringify(user));
        location.reload();
      }
    }

    function deleteTrip(tripId) {
      if (confirm('Вы уверены, что хотите удалить эту поездку?')) {
        const user = Auth.getCurrentUser();
        const users = JSON.parse(localStorage.getItem('wayfarer_users'));
        users[user.email].trips = users[user.email].trips.filter(t => t.id !== tripId);
        localStorage.setItem('wayfarer_users', JSON.stringify(users));
        user.trips = users[user.email].trips;
        localStorage.setItem('wayfarer_current_user', JSON.stringify(user));
        location.reload();
      }
    }
  function completeTrip(id){const comment=prompt("Комментарий о поездке:");const rating=prompt("Оценка от 1 до 5:");alert(`Спасибо! Ваш отзыв: ${comment} | Оценка: ${rating}`);}
</script>
</body>
</html>
