<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация — Wayfarer KG</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(26,15,8,0.95) 0%, rgba(192,24,42,0.15) 50%, rgba(26,15,8,0.95) 100%);
      background-image:
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(200,151,42,0.1)" stroke-width="1"/><circle cx="50" cy="50" r="50" fill="none" stroke="rgba(200,151,42,0.05)" stroke-width="1"/></svg>');
      background-size: 200px 200px;
      padding: 2rem;
    }

    .auth-container {
      background: var(--cream);
      max-width: 500px;
      width: 100%;
      padding: 3rem;
      border: 2px solid var(--gold);
      box-shadow: 0 20px 60px rgba(26,15,8,0.4);
      position: relative;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 30px;
      width: 60px;
      height: 4px;
      background: var(--crimson);
    }

    .auth-container::after {
      content: '';
      position: absolute;
      top: -2px;
      right: 30px;
      width: 60px;
      height: 4px;
      background: var(--crimson);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(200,151,42,0.2);
    }

    .auth-logo a {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.5rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .auth-logo span {
      color: var(--crimson);
      font-size: 1rem;
    }

    .auth-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      color: var(--deep);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--mid);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: var(--deep);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem;
      border: 1px solid rgba(200,151,42,0.3);
      background: rgba(200,151,42,0.05);
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Jost', sans-serif;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(200,151,42,0.1);
      box-shadow: 0 0 0 3px rgba(200,151,42,0.1);
    }

    .form-group input::placeholder {
      color: rgba(45,26,14,0.5);
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--crimson);
      color: var(--white);
      border: none;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background: var(--dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(192,24,42,0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .auth-switch {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(200,151,42,0.2);
      color: var(--mid);
      font-size: 0.9rem;
    }

    .auth-switch a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-switch a:hover {
      color: var(--crimson);
    }

    .error-message {
      background: rgba(192,24,42,0.1);
      border: 1px solid var(--crimson);
      color: var(--crimson);
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      border-radius: 2px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(0,128,0,0.1);
      border: 1px solid green;
      color: green;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      border-radius: 2px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .ornament-divider {
      text-align: center;
      color: var(--gold);
      margin: 1.5rem 0;
      font-size: 1.2rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--crimson);
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="index.html">
          <span>✦</span> WAYFARER KG
        </a>
      </div>

      <div id="authForm">
        <!-- ФОРМА ВХОДА (по умолчанию) -->
        <div id="loginForm">
          <h2 class="auth-title">Вход</h2>
          <p class="auth-subtitle">Добро пожаловать обратно, путешественник</p>

          <div class="error-message" id="loginError"></div>
          <div class="success-message" id="loginSuccess"></div>

          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input
                type="email"
                id="loginEmail"
                placeholder="ваш@email.com"
                required
              >
            </div>

            <div class="form-group">
              <label for="loginPassword">Пароль</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="Введите пароль"
                required
              >
            </div>

            <button type="submit" class="btn-submit">Войти</button>
          </form>

          <div class="auth-switch">
            Нет аккаунта?
            <a href="#" onclick="switchToRegister(event)">Зарегистрироваться</a>
          </div>
        </div>

        <!-- ФОРМА РЕГИСТРАЦИИ (скрыта) -->
        <div id="registerForm" style="display: none;">
          <h2 class="auth-title">Регистрация</h2>
          <p class="auth-subtitle">Начните своё путешествие в Киргизию</p>

          <div class="error-message" id="registerError"></div>
          <div class="success-message" id="registerSuccess"></div>

          <form onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="regName">Ваше имя</label>
              <input
                type="text"
                id="regName"
                placeholder="Ваше полное имя"
                required
              >
            </div>

            <div class="form-group">
              <label for="regEmail">Email</label>
              <input
                type="email"
                id="regEmail"
                placeholder="ваш@email.com"
                required
              >
            </div>

            <div class="form-group">
              <label for="regPassword">Пароль</label>
              <input
                type="password"
                id="regPassword"
                placeholder="Минимум 6 символов"
                required
                minlength="6"
              >
            </div>

            <div class="form-group">
              <label for="regPasswordConfirm">Подтвердите пароль</label>
              <input
                type="password"
                id="regPasswordConfirm"
                placeholder="Повторите пароль"
                required
                minlength="6"
              >
            </div>

            <button type="submit" class="btn-submit">Зарегистрироваться</button>
          </form>

          <div class="auth-switch">
            Уже есть аккаунт?
            <a href="#" onclick="switchToLogin(event)">Войти</a>
          </div>
        </div>
      </div>

      <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>
  </div>

  
<script src="auth.js"></script>

<script>

    function switchToRegister(e){

        e.preventDefault();

        document.getElementById(
            'loginForm'
        ).style.display = 'none';

        document.getElementById(
            'registerForm'
        ).style.display = 'block';

        clearErrors();

    }



    function switchToLogin(e){

        e.preventDefault();

        document.getElementById(
            'registerForm'
        ).style.display = 'none';

        document.getElementById(
            'loginForm'
        ).style.display = 'block';

        clearErrors();

    }



    function clearErrors(){

        document
        .getElementById('loginError')
        .classList.remove('show');

        document
        .getElementById('loginSuccess')
        .classList.remove('show');

        document
        .getElementById('registerError')
        .classList.remove('show');

        document
        .getElementById('registerSuccess')
        .classList.remove('show');

    }



    function showError(elementId,message){

        const element =
            document.getElementById(
                elementId
            );

        element.textContent =
            message;

        element.classList.add(
            'show'
        );

        setTimeout(() => {

            element.classList.remove(
                'show'
            );

        },5000);

    }



    function showSuccess(elementId,message){

        const element =
            document.getElementById(
                elementId
            );

        element.textContent =
            message;

        element.classList.add(
            'show'
        );

    }



    // =========================
    // LOGIN
    // =========================

    async function handleLogin(e){

        e.preventDefault();

        clearErrors();

        const email =
            document.getElementById(
                'loginEmail'
            ).value;

        const password =
            document.getElementById(
                'loginPassword'
            ).value;


        // ВАЖНО await

        const result =
            await Auth.login(
                email,
                password
            );


        if(result.success){

            showSuccess(

                'loginSuccess',

                '✓ Успешно вошли!'

            );

            setTimeout(() => {

                window.location.href =
                    'index.html';

            },1500);

        }else{

            showError(

                'loginError',

                '✗ ' + result.message

            );

        }

    }



    // =========================
    // REGISTER
    // =========================

    async function handleRegister(e){

        e.preventDefault();

        clearErrors();


        const name =
            document.getElementById(
                'regName'
            ).value;

        const email =
            document.getElementById(
                'regEmail'
            ).value;

        const password =
            document.getElementById(
                'regPassword'
            ).value;

        const passwordConfirm =
            document.getElementById(
                'regPasswordConfirm'
            ).value;



        // ПРОВЕРКА

        if(password !== passwordConfirm){

            showError(

                'registerError',

                '✗ Пароли не совпадают'

            );

            return;

        }



        if(password.length < 6){

            showError(

                'registerError',

                '✗ Минимум 6 символов'

            );

            return;

        }



        // ВАЖНО await

        const result =
            await Auth.register(
                email,
                password,
                name
            );



        if(result.success){

            showSuccess(

                'registerSuccess',

                '✓ ' + result.message

            );



            document.getElementById(
                'regName'
            ).value = '';

            document.getElementById(
                'regEmail'
            ).value = '';

            document.getElementById(
                'regPassword'
            ).value = '';

            document.getElementById(
                'regPasswordConfirm'
            ).value = '';



            setTimeout(() => {

                switchToLogin(
                    new Event('click')
                );

                document.getElementById(
                    'loginEmail'
                ).value = email;

            },2000);

        }else{

            showError(

                'registerError',

                '✗ ' + result.message

            );

        }

    }



    // =========================
    // REDIRECT
    // =========================

    if(Auth.isLoggedIn()){

        window.location.href =
            'index.html';

    }

</script>

<script src="script.js"></script>
```

</html>
